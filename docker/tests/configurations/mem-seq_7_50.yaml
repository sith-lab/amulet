# contract
contract_observation_clause: mem
contract_execution_clause:
  - seq

# tested instructions
instruction_categories:
  - BASE-COND_BR
  - BASE-BINARY
  - BASE-BITBYTE
  - BASE-MISC
  - BASE-CMOV
  - BASE-DATAXFER
  - BASE-FLAGOP
  

# fuzzing configuration
enable_speculation_filter: true
enable_observation_filter: true
min_bb_per_function: 7
max_bb_per_function: 7
program_size: 50
avg_mem_accesses: 20
inputs_per_class: 2