# contract
contract_observation_clause: arch
contract_execution_clause:
  - cond-bpas

# tested instructions
instruction_categories:
  - BASE-BINARY
  - BASE-BITBYTE
  - BASE-MISC
  - BASE-CMOV
  - BASE-DATAXFER
  - BASE-FLAGOP
  - BASE-CONVERT
  - BASE-NOP
  - BASE-POP
  - BASE-PUSH
  - BASE-LOGICAL
  - BASE-SEMAPHORE
  - BASE-SETCC
  - BASE-STRINGOP
  - BASE-COND_BR
  

# fuzzing configuration
enable_speculation_filter: true
enable_observation_filter: true
min_bb_per_function: 2
max_bb_per_function: 6
program_size: 40
avg_mem_accesses: 15
inputs_per_class: 2