supported_categories:
  - BASE-COND_BR
  #- BASE-NOP
  - BASE-BITBYTE
  - BASE-CMOV
  #- BASE-CONVERT
  #- BASE-DATAXFER
  - BASE-FLAGOP
  #- BASE-SETCC
  - BASE-LOGICAL
  
contract_observation_clause: ct
contract_execution_clause:
  - seq

enable_ssbp_patch: true
enable_assist_page: false
feedback_driven_generator: true
gem5_enable_cross_test_case_checkpoints: true
# Attempt to find violation without checkpointing!!! -- Not possible!

avg_mem_accesses: 16 #Try 16 if needed
min_bb_per_function: 5
max_bb_per_function: 5
test_case_size: 16
test_case_generator_seed: 10
input_gen_entropy_bits: 16
memory_access_zeroed_bits: 0
# BUG: input gen (NOT test case gen) is still using random seed (occasionally)


executor: 'x86-gem5'
gem5_location: "/code/gem5-docker"
gem5_checkpoint: "/code/gem5-docker/checkpoint"
gem5_output_location: "/code/gem5-docker/m5out"
gem5_binary: "/code/gem5-docker/build/X86/gem5.opt"
gem5_se: "/code/gem5-docker/configs/example/se.py"
l1d_size: "32kB"
l1i_size: "32kB"
l1d_assoc: 8
l1i_assoc: 2
  

gem5_test_case_path: "test_case"
gem5_trace_mode:  "data_cache"
gem5_batch_size:  1
gem5_restore:  1

gem5_attacker_mode:
   sources : ["data_cache","instr_cache"]
   bitmask : 0xFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFF

logging_modes:
  - info
  - fuzzer_debug
  # - fuzzer_trace
  # - coverage_debug
# fuzzer_trace: Unicorn memory trace
